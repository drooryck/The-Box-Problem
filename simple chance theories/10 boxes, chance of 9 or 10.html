<script>

// this doc is made for calculating the chance that in an array of 10 uniformly distributed(1-10) boxes, you have one box which is 9 or 10

var counterTrue = 0;
var counterFalse = 0;
condition=0

while(condition<10000){


	var a = [];
	var isThere10 = false


	for(i=0;i<100;i++){
		a.push(Math.ceil(10*Math.random()))
	}





	for(i=0;i<10;i++){

			if( a[i] == 9 || a[i] == 10){
				var isThere10 = true
				break;
			}
			else{
				isThere10 = false

			}

		}

	if(isThere10 == true){

	counterTrue++
	}

	else{

	counterFalse++

	}

condition = condition + 1
}


document.write('<br>' + counterTrue)
document.write('<br>' + counterFalse)
document.write('<br>')


var totalCounter = counterTrue + counterFalse;

var chance = counterTrue / totalCounter

document.write("The chance of 9 or 10 is "+chance)





</script>
